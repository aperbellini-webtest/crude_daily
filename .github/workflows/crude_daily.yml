name: Crude Daily

on:
  schedule:
    - cron: '0 5,9,13,17 * * 1-5'  # 07:00, 11:00, 15:00, 19:00 ora italiana (lun-ven)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Debug - Verifica configurazione SendGrid
        run: |
          echo "=== CONFIGURAZIONE SENDGRID ==="
          echo "SENDGRID_API_KEY impostato: ${SENDGRID_API_KEY:+YES}"
          echo "Sender email: aperbellini@gmail.com (deve essere verificata in SendGrid)"
          echo "Recipient: accounting@perbellini.info"
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}

      - name: Test SMTP SendGrid
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          python3 -c "
          import smtplib, ssl, os
          
          sender = 'aperbellini@gmail.com'  # ← Deve essere verificata in SendGrid
          api_key = os.environ['SENDGRID_API_KEY']
          recipient = 'accounting@perbellini.info'
          
          msg = f'''From: {sender}
          To: {recipient}
          Subject: TEST SENDGRID da GitHub Actions
          
          Se leggi questo, SendGrid funziona!
          '''
          
          context = ssl.create_default_context()
          with smtplib.SMTP('smtp.sendgrid.net', 587) as server:
              server.starttls(context=context)
              server.login('apikey', api_key)
              server.sendmail(sender, recipient, msg)
          print('✅ Test SendGrid OK')
          "

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script principale
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python crude_daily.py

      - name: Upload outputs (grafici e CSV)
        uses: actions/upload-artifact@v4
        with:
          name: crude-daily-outputs
          path: |
            *.png
            *.csv
          if-no-files-found: error

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            /tmp/crude_debug.log
            *.log
          if-no-files-found: warn
