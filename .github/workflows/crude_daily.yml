name: Crude Daily

on:
  schedule:
    - cron: '0 5,9,13,17 * * 1-5'  # 07:00, 11:00, 15:00, 19:00 IT
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Debug - Verifica secrets e destinatario
        run: |
          echo "=== CONFIGURAZIONE EMAIL ==="
          echo "CRUDE_GMAIL_USER: ${CRUDE_GMAIL_USER}"
          echo "Destinatario nel codice: accounting@perbellini.info"
          echo "Per test, modifica manualmente il file crude_daily.py se vuoi cambiare destinatario"
        env:
          CRUDE_GMAIL_USER: ${{ secrets.CRUDE_GMAIL_USER }}

      - name: Test invio email semplice (diagnostico)
        env:
          CRUDE_GMAIL_USER: ${{ secrets.CRUDE_GMAIL_USER }}
          CRUDE_GMAIL_APP_PASSWORD: ${{ secrets.CRUDE_GMAIL_APP_PASSWORD }}
        run: |
          python3 -c "
          import smtplib, ssl
          sender = '${CRUDE_GMAIL_USER}'
          pwd = '${CRUDE_GMAIL_APP_PASSWORD}'
          recipient = 'accounting@perbellini.info'
          # Test anche a un indirizzo personale se vuoi
          # recipient = 'tuo.email@gmail.com'
          
          msg = '''From: {}
          To: {}
          Subject: TEST SMTP da GitHub Actions - {}
          
          Questo è un test puro. Se leggi questo, l'invio funziona.
          '''.format(sender, recipient, '2026-04-21')
          
          context = ssl.create_default_context()
          with smtplib.SMTP('smtp.gmail.com', 587) as server:
              server.starttls(context=context)
              server.login(sender, pwd)
              server.sendmail(sender, recipient, msg)
          print('Test email inviata a', recipient)
          "

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script principale
        env:
          CRUDE_GMAIL_USER: ${{ secrets.CRUDE_GMAIL_USER }}
          CRUDE_GMAIL_APP_PASSWORD: ${{ secrets.CRUDE_GMAIL_APP_PASSWORD }}
        run: python crude_daily.py

      - name: Upload outputs (grafici e CSV)
        uses: actions/upload-artifact@v4
        with:
          name: crude-daily-outputs
          path: |
            *.png
            *.csv
          if-no-files-found: error

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            /tmp/crude_debug.log
            *.log
          if-no-files-found: warn
