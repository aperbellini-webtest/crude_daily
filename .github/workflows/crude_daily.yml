name: Crude Daily

on:
  schedule:
    - cron: '0 5,9,13,17 * * 1-5'  # 07:00, 11:00, 15:00, 19:00 ora italiana (lun-ven)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Debug - Verifica Secrets
        run: |
          echo "=== DEBUG SECRETS ==="
          echo "CRUDE_GMAIL_USER impostato: ${CRUDE_GMAIL_USER:+YES}"
          echo "CRUDE_GMAIL_USER length: ${#CRUDE_GMAIL_USER}"
          echo "CRUDE_GMAIL_APP_PASSWORD impostato: ${CRUDE_GMAIL_APP_PASSWORD:+YES}"
          echo "CRUDE_GMAIL_APP_PASSWORD length: ${#CRUDE_GMAIL_APP_PASSWORD}"
          
          if [ -z "$CRUDE_GMAIL_USER" ]; then
            echo "::error::CRUDE_GMAIL_USER è vuoto o non impostato!"
            exit 1
          fi
          
          if [ -z "$CRUDE_GMAIL_APP_PASSWORD" ]; then
            echo "::error::CRUDE_GMAIL_APP_PASSWORD è vuoto o non impostato!"
            exit 1
          fi
          
          echo "=== SECRETS OK ==="
        env:
          CRUDE_GMAIL_USER: ${{ secrets.CRUDE_GMAIL_USER }}
          CRUDE_GMAIL_APP_PASSWORD: ${{ secrets.CRUDE_GMAIL_APP_PASSWORD }}

      - name: Test - Connessione SMTP
        run: |
          echo "=== TEST CONNESSIONE SMTP ==="
          python3 -c "
          import smtplib
          import ssl
          
          print('Test connessione a smtp.gmail.com:587...')
          context = ssl.create_default_context()
          
          try:
              server = smtplib.SMTP('smtp.gmail.com', 587, timeout=10)
              print('✓ Connessione stabilita')
              server.starttls(context=context)
              print('✓ TLS avviato')
              server.quit()
              print('✓ Test SMTP completato con successo')
          except Exception as e:
              print(f'✗ Errore SMTP: {e}')
              exit(1)
          "

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          CRUDE_GMAIL_USER: ${{ secrets.CRUDE_GMAIL_USER }}
          CRUDE_GMAIL_APP_PASSWORD: ${{ secrets.CRUDE_GMAIL_APP_PASSWORD }}
        run: python crude_daily.py

      - name: Upload outputs (grafici e CSV)
        uses: actions/upload-artifact@v4
        with:
          name: crude-daily-outputs
          path: |
            *.png
            *.csv
          if-no-files-found: error

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            /tmp/crude_debug.log
            *.log
          if-no-files-found: warn
