name: Crude Daily

oon:
  schedule:
    - cron: '0 7,11,15,19 * * 1-5'
  workflow_dispatch:


jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          CRUDE_GMAIL_USER: ${{ secrets.CRUDE_GMAIL_USER }}
          CRUDE_GMAIL_APP_PASSWORD: ${{ secrets.CRUDE_GMAIL_APP_PASSWORD }}
        run: python crude_daily.py
